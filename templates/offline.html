{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You're Offline – Trip Budget Monitor</title>
  <link rel="shortcut icon" href="{% static 'icons/favicon.png' %}" type="image/x-icon"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f4f8;
      --accent:  #6366f1;
      --text:    #1f2937;
      --muted:   #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: rgba(99,102,241,0.10);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: rgba(124,58,237,0.08);
      bottom: -100px; right: -100px;
    }

    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(99,102,241,0.10), 0 4px 16px rgba(0,0,0,0.05);
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px rgba(99,102,241,0.30);
    }
    .brand-icon i { font-size: 22px; color: #fff; }
    .brand-name { font-size: 18px; font-weight: 700; color: var(--text); }

    .icon-wrap {
      width: 90px; height: 90px;
      background: #eef2ff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pulse-ring 2.5s ease-out infinite;
    }
    .icon-wrap i { font-size: 40px; color: var(--accent); animation: shake 3s ease-in-out infinite; }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.35); }
      70%  { box-shadow: 0 0 0 18px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }
    @keyframes shake {
      0%,100% { transform: rotate(0); }
      15%     { transform: rotate(-12deg); }
      30%     { transform: rotate(12deg); }
      45%     { transform: rotate(-8deg); }
      60%     { transform: rotate(8deg); }
      75%     { transform: rotate(0); }
    }

    .signal {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      height: 26px;
      margin-bottom: 1.5rem;
    }
    .bar {
      width: 7px;
      background: #d1d5db;
      border-radius: 3px;
      animation: bar-blink 1.6s ease-in-out infinite;
    }
    .bar:nth-child(1) { height: 7px;  animation-delay: 0s; }
    .bar:nth-child(2) { height: 13px; animation-delay: 0.2s; }
    .bar:nth-child(3) { height: 19px; animation-delay: 0.4s; }
    .bar:nth-child(4) { height: 26px; animation-delay: 0.6s; }
    @keyframes bar-blink {
      0%,100% { opacity: 0.25; background: #d1d5db; }
      50%     { opacity: 1;    background: var(--accent); }
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    p  { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }

    .tip {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      color: #4338ca;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-align: left;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(99,102,241,0.35); }
    .btn:active { transform: translateY(0); }

    .dots { display: flex; gap: 6px; justify-content: center; margin-top: 2rem; }
    .dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.3; animation: dot-b 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #7c3aed; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #a855f7; }
    @keyframes dot-b {
      0%,80%,100% { transform: scale(1); opacity: 0.3; }
      40%          { transform: scale(1.5); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="brand">
      <div class="brand-icon"><i class="ti ti-plane"></i></div>
      <span class="brand-name">TripBudget</span>
    </div>

    <div class="icon-wrap">
      <i class="ti ti-wifi-off"></i>
    </div>

    <div class="signal">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <h1>You're Offline</h1>
    <p>No internet connection found. Your trip data is safely stored — reconnect to sync and access all features.</p>

    <div class="tip">
      <i class="ti ti-bulb" style="font-size:16px;flex-shrink:0;"></i>
      Previously visited pages may still be available from cache.
    </div>

    <button class="btn" onclick="window.location.reload()">
      <i class="ti ti-refresh"></i> Try Again
    </button>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </div>

  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
