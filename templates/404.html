{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found – Trip Budget Monitor</title>
  <link rel="shortcut icon" href="{% static 'icons/favicon.png' %}" type="image/x-icon"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f4f8;
      --accent:  #6366f1;
      --text:    #1f2937;
      --muted:   #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    body::before {
      width: 550px; height: 550px;
      background: rgba(99,102,241,0.09);
      top: -180px; right: -180px;
    }
    body::after {
      width: 400px; height: 400px;
      background: rgba(236,72,153,0.07);
      bottom: -100px; left: -100px;
    }

    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(99,102,241,0.10), 0 4px 16px rgba(0,0,0,0.05);
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px rgba(99,102,241,0.30);
    }
    .brand-icon i { font-size: 22px; color: #fff; }
    .brand-name { font-size: 18px; font-weight: 700; color: var(--text); }

    .four-o-four {
      font-size: clamp(5rem, 20vw, 7.5rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 50%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto;
      animation: grad-move 4s ease infinite;
      margin-bottom: 0.5rem;
    }
    @keyframes grad-move {
      0%,100% { background-position: 0% center; }
      50%     { background-position: 100% center; }
    }

    .compass {
      font-size: 3rem;
      display: block;
      margin: 0 auto 0.75rem;
      animation: wobble 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 10px rgba(99,102,241,0.25));
      color: var(--accent);
    }
    @keyframes wobble {
      0%,100% { transform: rotate(-15deg); }
      50%     { transform: rotate(15deg); }
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
    p  { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.25rem; }

    .bad-url {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      border-radius: 8px;
      padding: 0.5rem 0.9rem;
      font-family: monospace;
      font-size: 0.82rem;
      color: #be185d;
      margin-bottom: 2rem;
      word-break: break-all;
      text-align: left;
    }

    .btn-group { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border-radius: 12px;
      padding: 0.7rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      border: none;
      transition: transform 0.18s, box-shadow 0.18s;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
    }
    .btn-secondary {
      background: #fff;
      color: #6366f1;
      border: 1.5px solid #c7d2fe;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(99,102,241,0.25); }
    .btn:active { transform: translateY(0); }

    .dot-grid {
      position: absolute;
      top: 1.2rem; right: 1.2rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }
    .gd { width: 5px; height: 5px; border-radius: 50%; background: #c7d2fe; animation: gd-p 2s ease-in-out infinite; }
    .gd:nth-child(2) { animation-delay: 0.3s; }
    .gd:nth-child(3) { animation-delay: 0.6s; }
    .gd:nth-child(4) { animation-delay: 0.9s; }
    .gd:nth-child(5) { animation-delay: 1.2s; }
    .gd:nth-child(6) { animation-delay: 1.5s; }
    .gd:nth-child(7) { animation-delay: 1.8s; }
    .gd:nth-child(8) { animation-delay: 2.1s; }
    .gd:nth-child(9) { animation-delay: 2.4s; }
    @keyframes gd-p {
      0%,100% { opacity: 0.35; transform: scale(1); }
      50%     { opacity: 1; transform: scale(1.5); background: #6366f1; }
    }

    .dots { display: flex; gap: 6px; justify-content: center; margin-top: 2rem; }
    .dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.3; animation: dot-b 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #7c3aed; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #a855f7; }
    @keyframes dot-b {
      0%,80%,100% { transform: scale(1); opacity: 0.3; }
      40%          { transform: scale(1.5); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="dot-grid">
      <div class="gd"></div><div class="gd"></div><div class="gd"></div>
      <div class="gd"></div><div class="gd"></div><div class="gd"></div>
      <div class="gd"></div><div class="gd"></div><div class="gd"></div>
    </div>

    <div class="brand">
      <div class="brand-icon"><i class="ti ti-plane"></i></div>
      <span class="brand-name">TripBudget</span>
    </div>

    <i class="ti ti-compass compass"></i>
    <div class="four-o-four">404</div>

    <h1>Lost in the Journey</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>

    <div class="bad-url" id="bad-url">📍 {{ request.path }}</div>

    <div class="btn-group">
      <a href="/" class="btn btn-primary"><i class="ti ti-home"></i> Go Home</a>
      <button class="btn btn-secondary" onclick="history.back()"><i class="ti ti-arrow-left"></i> Go Back</button>
    </div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </div>
</body>
</html>
