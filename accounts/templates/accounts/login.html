{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Trip Budget Monitor</title>
  <link rel="shortcut icon" href="{% static 'icons/favicon.png' %}" type="image/x-icon"/>
  <link rel="manifest" href="{% static 'manifest.json' %}"/>
  <meta name="theme-color" content="#6366f1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo:     #6366f1;
      --indigo-dk:  #4f46e5;
      --indigo-lt:  #eef2ff;
      --navy:       #0f172a;
      --slate:      #1e293b;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --surface:    #f8fafc;
      --white:      #ffffff;
      --red:        #ef4444;
      --green:      #10b981;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      overflow: hidden;
      position: relative;
    }

    /* ── Animated mesh background ── */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(124,58,237,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 20%, rgba(16,185,129,0.12) 0%, transparent 55%);
      animation: meshShift 12s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      0%   { filter: blur(0px); opacity: 1; }
      50%  { filter: blur(4px); opacity: 0.85; }
      100% { filter: blur(0px); opacity: 1; }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.18;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 320px; height: 320px; background: #6366f1; top: -80px; left: -80px; animation-delay: 0s; }
    .orb-2 { width: 240px; height: 240px; background: #7c3aed; bottom: -60px; right: -60px; animation-delay: -3s; }
    .orb-3 { width: 180px; height: 180px; background: #10b981; bottom: 30%; left: 10%; animation-delay: -6s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-20px) scale(1.04); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      margin: 24px 16px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 40px 36px;
      box-shadow:
        0 32px 64px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.15);
      animation: slideUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── Brand mark ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 8px 20px rgba(99,102,241,0.4);
      flex-shrink: 0;
    }
    .brand-text {}
    .brand-text .name {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }
    .brand-text .tagline {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
      margin-top: 2px;
    }

    /* ── Headline ── */
    .headline {
      font-size: 1.65rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* ── Error banner ── */
    .error-banner {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.83rem;
      color: #fca5a5;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .error-banner::before { content: '⚠️'; flex-shrink: 0; }

    /* ── Form fields ── */
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      pointer-events: none;
      opacity: 0.5;
    }
    .field input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      font-size: 0.95rem;
      color: #fff;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus {
      border-color: rgba(99,102,241,0.7);
      background: rgba(99,102,241,0.1);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: rgba(255,255,255,0.35);
      padding: 0;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: rgba(255,255,255,0.7); }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 8px 24px rgba(99,102,241,0.45);
      position: relative;
      overflow: hidden;
    }
    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(99,102,241,0.55); }
    .btn-submit:hover::after { opacity: 1; }
    .btn-submit:active { transform: translateY(0); }

    /* ── Footer link ── */
    .footer-note {
      text-align: center;
      margin-top: 22px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
    }
    .footer-note a {
      color: rgba(99,102,241,0.9);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-note a:hover { color: #818cf8; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .divider-text {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Feature pills ── */
    .feature-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 24px;
      justify-content: center;
    }
    .pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      .headline { font-size: 1.4rem; }
    }
  
[data-theme="dark"] {
  --bg:        #0f1117;
  --white:     #1a1d27;
  --surface:   #1e2130;
  --border:    #2d3148;
  --accent:    #818cf8;
  --accent-lt: #1e2040;
  --accent-md: #4338ca;
  --green:     #34d399;
  --green-lt:  #064e3b;
  --red:       #f87171;
  --red-lt:    #450a0a;
  --yellow:    #fbbf24;
  --yellow-lt: #451a03;
  --purple:    #a78bfa;
  --purple-lt: #2e1065;
  --orange:    #fb923c;
  --orange-lt: #431407;
  --text:      #e5e7eb;
  --text-md:   #d1d5db;
  --muted:     #9ca3af;
  --muted-lt:  #6b7280;
  --shadow:    0 4px 24px rgba(0,0,0,.35);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.25);
}

  </style>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>

<div class="bg-mesh"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">✈️</div>
    <div class="brand-text">
      <div class="name">Trip Budget Monitor</div>
      <div class="tagline">Smart travel spending tracker</div>
    </div>
  </div>

  <div class="headline">Welcome back</div>
  <div class="sub">Sign in to continue to your trips</div>

  {% if error %}
  <div class="error-banner">{{ error }}</div>
  {% endif %}

  <form method="POST" autocomplete="on">
    {% csrf_token %}

    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" name="username" placeholder="Enter your username" required autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" name="password" id="pw" placeholder="Enter your password" required autocomplete="current-password"/>
        <button type="button" class="pw-toggle" onclick="togglePw()" id="pw-eye">👁</button>
      </div>
    </div>

    <button type="submit" class="btn-submit">Sign In →</button>
  </form>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">Track every rupee</div>
    <div class="divider-line"></div>
  </div>

  <div class="feature-pills">
    <span class="pill">📊 Live budgets</span>
    <span class="pill">🧾 Receipt scan</span>
    <span class="pill">👥 Group splits</span>
    <span class="pill">📍 Heatmaps</span>
  </div>

</div>

<script>
  function togglePw() {
    const inp = document.getElementById('pw');
    const eye = document.getElementById('pw-eye');
    if (inp.type === 'password') { inp.type = 'text'; eye.textContent = '🙈'; }
    else { inp.type = 'password'; eye.textContent = '👁'; }
  }
</script>
</body>
</html>
