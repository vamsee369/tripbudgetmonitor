{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading – Trip Budget Monitor</title>
  <link rel="shortcut icon" href="{% static 'icons/favicon.png' %}" type="image/x-icon"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4f8;
      --accent:    #6366f1;
      --text:      #1f2937;
      --muted:     #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeIn 0.5s ease both;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(99,102,241,0.35);
    }
    .brand-icon i { font-size: 26px; color: #fff; }
    .brand-name { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }

    /* Triple concentric spinner */
    .spinner-wrap {
      position: relative;
      width: 80px; height: 80px;
      animation: fadeIn 0.5s 0.15s ease both;
    }
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
    }
    .ring-outer  { border-top-color: var(--accent); animation: spin 1s linear infinite; }
    .ring-middle { inset: 10px; border-right-color: #7c3aed; animation: spin 0.75s linear infinite reverse; }
    .ring-inner  { inset: 20px; border-bottom-color: #a855f7; animation: spin 0.5s linear infinite; }
    .ring-dot {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .ring-dot::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.6; } }

    /* Progress bar */
    .progress-wrap {
      width: 200px;
      animation: fadeIn 0.5s 0.3s ease both;
    }
    .progress-track {
      height: 4px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      width: 0%;
      /* Fast initial fill then slow crawl — feels responsive immediately */
      animation: progress 1.8s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes progress {
      0%   { width: 0%; }
      20%  { width: 55%; }
      50%  { width: 78%; }
      80%  { width: 90%; }
      100% { width: 95%; }
    }

    .status-text {
      font-size: 13px;
      color: var(--muted);
      animation: fadeIn 0.5s 0.4s ease both;
      height: 20px;
      transition: opacity 0.25s;
    }

    .dots {
      display: flex; gap: 6px;
      animation: fadeIn 0.5s 0.5s ease both;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.3;
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #7c3aed; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #a855f7; }

    @keyframes dotBounce {
      0%,80%,100% { transform: scale(1); opacity: 0.3; }
      40%          { transform: scale(1.5); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-icon"><i class="ti ti-plane"></i></div>
      <span class="brand-name">TripBudget</span>
    </div>

    <div class="spinner-wrap">
      <div class="ring ring-outer"></div>
      <div class="ring ring-middle"></div>
      <div class="ring ring-inner"></div>
      <div class="ring-dot"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
    </div>

    <div class="status-text" id="statusText">Getting your trips ready...</div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

 <script>
  const messages = [
    'Getting your trips ready...',
    'Loading your expenses...',
    'Crunching the numbers...',
    'Almost there...',
  ];
  let i = 0;
  const el = document.getElementById('statusText');
  setInterval(() => {
    i = (i + 1) % messages.length;
    el.style.opacity = 0;
    setTimeout(() => { el.textContent = messages[i]; el.style.opacity = 1; }, 200);
  }, 1500);

  // Wait for the next page to actually be fetched, THEN redirect
  const params = new URLSearchParams(window.location.search);
  const next = params.get('next') || '/';

  fetch(next, { method: 'GET', credentials: 'same-origin' })
    .then(() => {
      window.location.href = next;
    })
    .catch(() => {
      // fetch failed (offline?) — redirect anyway after 3s
      setTimeout(() => { window.location.href = next; }, 3000);
    });
</script>
</body>
</html>
