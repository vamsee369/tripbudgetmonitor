{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Trip – {{ trip.name }}</title>
  <link rel="manifest" href="{% static 'manifest.json' %}"/>
  <link rel="shortcut icon" href="{% static 'icons/favicon.png' %}" type="image/x-icon"/>
  <meta name="theme-color" content="#6366f1"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4f8;
      --white:     #ffffff;
      --surface:   #f8f9ff;
      --border:    #e5e7eb;
      --accent:    #6366f1;
      --accent-lt: #eef2ff;
      --accent-md: #c7d2fe;
      --green:     #10b981;
      --green-lt:  #d1fae5;
      --red:       #ef4444;
      --red-lt:    #fee2e2;
      --yellow:    #f59e0b;
      --yellow-lt: #fef3c7;
      --purple:    #7c3aed;
      --purple-lt: #ede9fe;
      --text:      #1f2937;
      --text-md:   #374151;
      --muted:     #6b7280;
      --muted-lt:  #9ca3af;
      --radius:    20px;
      --radius-sm: 12px;
      --shadow:    0 4px 24px rgba(0,0,0,.07);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.05);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Sticky Topbar ── */
    .topbar {
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 12px rgba(99,102,241,.35);
      flex-shrink: 0;
    }
    .brand-text .bname {
      font-size: .92rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .brand-text .btag {
      font-size: .68rem;
      color: var(--muted);
      font-weight: 500;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-md);
      text-decoration: none;
      flex-shrink: 0;
      transition: background .15s;
    }
    .back-link:hover { background: var(--accent-lt); color: var(--accent); border-color: var(--accent-md); }

    /* ── Page ── */
    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Hero banner ── */
    .hero-card {
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
      border-radius: var(--radius);
      padding: 24px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(99,102,241,.35);
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 150px; height: 150px;
      background: rgba(255,255,255,.08);
      border-radius: 50%;
    }
    .hero-emoji { font-size: 2.4rem; flex-shrink: 0; z-index: 1; }
    .hero-text { z-index: 1; }
    .hero-text h1 {
      font-size: 1.2rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 3px;
    }
    .hero-text p {
      font-size: .78rem;
      color: rgba(255,255,255,.72);
      font-weight: 400;
    }

    /* ── Form card ── */
    .form-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field-group label {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .field-group input,
    .field-group select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .9rem;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    .field-group input:focus,
    .field-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
      background: var(--white);
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Participants toggle ── */
    .section-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
    }
    .toggle-participants {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: .88rem;
      font-weight: 600;
      color: var(--text-md);
      transition: all .15s;
      width: 100%;
      text-align: left;
    }
    .toggle-participants:hover {
      border-color: var(--accent);
      background: var(--accent-lt);
      color: var(--accent);
    }
    .toggle-participants i { font-size: 1.1rem; color: var(--accent); }
    .toggle-participants .toggle-caret { margin-left: auto; font-size: .9rem; color: var(--muted-lt); transition: transform .2s; }
    .toggle-participants.open .toggle-caret { transform: rotate(180deg); }

    .participants-section {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .participants-section.open { display: flex; }
    .participant-input {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }
    .participant-input i { color: var(--accent); font-size: 1rem; flex-shrink: 0; }
    .participant-input input {
      border: none;
      background: transparent;
      outline: none;
      font-size: .88rem;
      color: var(--text);
      flex: 1;
      font-family: inherit;
    }

    /* ── Buttons ── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,.35);
      transition: transform .15s, box-shadow .15s;
      font-family: inherit;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,.4);
    }
    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      background: var(--surface);
      color: var(--text-md);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
      font-family: inherit;
    }
    .btn-secondary:hover {
      background: var(--accent-lt);
      color: var(--accent);
      border-color: var(--accent-md);
    }

    @media (max-width: 400px) {
      .date-row { grid-template-columns: 1fr; }
    }
  
[data-theme="dark"] {
  --bg:        #0f1117;
  --white:     #1a1d27;
  --surface:   #1e2130;
  --border:    #2d3148;
  --accent:    #818cf8;
  --accent-lt: #1e2040;
  --accent-md: #4338ca;
  --green:     #34d399;
  --green-lt:  #064e3b;
  --red:       #f87171;
  --red-lt:    #450a0a;
  --yellow:    #fbbf24;
  --yellow-lt: #451a03;
  --purple:    #a78bfa;
  --purple-lt: #2e1065;
  --orange:    #fb923c;
  --orange-lt: #431407;
  --text:      #e5e7eb;
  --text-md:   #d1d5db;
  --muted:     #9ca3af;
  --muted-lt:  #6b7280;
  --shadow:    0 4px 24px rgba(0,0,0,.35);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.25);
}

  </style>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">✈️</div>
    <div class="brand-text">
      <div class="bname">Trip Budget Monitor</div>
      <div class="btag">Smart travel spending tracker</div>
    </div>
  </div>
  <a href="{% url 'trip_history' %}" class="back-link">
    <i class="ti ti-arrow-left" style="font-size:.85rem;"></i> Back
  </a>
</div>

<div class="page">

  <!-- Hero -->
  <div class="hero-card">
    <span class="hero-emoji">✏️</span>
    <div class="hero-text">
      <h1>Edit Trip</h1>
      <p>Update details for <strong style="color:#fff;">{{ trip.name }}</strong></p>
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form method="POST" style="display:flex;flex-direction:column;gap:16px;">
      {% csrf_token %}

      <div class="field-group">
        <label>Trip Name</label>
        <input type="text" name="trip_name" placeholder="e.g. Goa Beach Trip" value="{{ trip.name }}" required>
      </div>

      <div class="field-group">
        <label>Destination</label>
        <input type="text" name="destination" placeholder="e.g. Goa, India" value="{{ trip.destination }}" required>
      </div>

      <div class="date-row">
        <div class="field-group">
          <label>Start Date</label>
          <input type="date" name="start_date" value="{{ trip.start_date }}" required>
        </div>
        <div class="field-group">
          <label>End Date</label>
          <input type="date" name="end_date" value="{{ trip.end_date }}" required>
        </div>
      </div>

      <div class="field-group">
        <label>Budget (₹)</label>
        <input type="number" step="0.01" name="budget" placeholder="e.g. 25000" value="{{ trip.budget }}" required>
      </div>

      <!-- Participants toggle -->
      <div>
        <div class="section-label" style="margin-bottom:8px;">Participants</div>
        <button type="button" class="toggle-participants" id="toggleBtn" onclick="toggleParticipants()">
          <i class="ti ti-users"></i>
          Edit Participants
          <i class="ti ti-chevron-down toggle-caret"></i>
        </button>
        <div class="participants-section" id="participants">
          {% for friend in participants %}
          <div class="participant-input">
            <i class="ti ti-user"></i>
            <input type="text" name="friend{{ forloop.counter }}" placeholder="Friend {{ forloop.counter }}" value="{{ friend }}">
          </div>
          {% endfor %}
        </div>
      </div>

      <button type="submit" class="btn-primary">
        <i class="ti ti-check"></i> Update Trip
      </button>
    </form>

    <a href="{% url 'trip_history' %}" class="btn-secondary">
      <i class="ti ti-arrow-left"></i> Cancel
    </a>
  </div>

</div>

<script>
  function toggleParticipants() {
    const section = document.getElementById('participants');
    const btn = document.getElementById('toggleBtn');
    section.classList.toggle('open');
    btn.classList.toggle('open');
  }
</script>
</body>
</html>
